version: "3.9"

services:

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      args:
        - VITE_API_URL=http://localhost:3000/api
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
